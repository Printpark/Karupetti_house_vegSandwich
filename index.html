<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karupetti House</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f5f5f5;
}

.shop-banner{
    width:100%;
}

.shop-banner img{
    width:100%;
    height:230px;
    object-fit:cover;
    display:block;
}

.card{

    width:92%;
    max-width:360px;

    margin:-35px auto 30px;

    background:#fff;

    border-radius:18px;

    padding:25px;

    box-shadow:0 8px 25px rgba(0,0,0,.12);

}

h1{

    text-align:center;

    color:#222;

    font-size:30px;

    margin-bottom:18px;

}

.product{

    text-align:center;

    font-size:22px;

    font-weight:600;

    color:#2e7d32;

    margin-bottom:22px;

}

.info{
    font-size:18px;
}

.row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:16px 0;

    border-bottom:1px solid #ececec;

}

.label{

    font-weight:700;

    color:#333;

}

.value{

    color:#333;

}

.price{

    margin-top:22px;

    background:#edf7ef;

    color:#1b5e20;

    text-align:center;

    font-size:28px;

    font-weight:bold;

    padding:14px;

    border-radius:12px;

}

</style>

</head>

<body>

<div class="shop-banner">
    <img src="shop.jpg" alt="Karupetti House">
</div>

<div class="card">

<h1>Karupetti House</h1>

<div class="product">
🟢 VEG SANDWICH
</div>

<div class="info">

<div class="row">
<span class="label">FSSAI No.</span>
<span class="value">10026912000209</span>
</div>

<div class="row">
<span class="label">MFG</span>
<span class="value" id="mfg-date"></span>
</div>

<div class="row">
<span class="label">Validity</span>
<span class="value">1 Day</span>
</div>

</div>

<div class="price">
₹50
</div>

</div>

<script>

const today = new Date();

const day = String(today.getDate()).padStart(2,'0');
const month = String(today.getMonth()+1).padStart(2,'0');
const year = today.getFullYear();

document.getElementById("mfg-date").textContent =
`${day}-${month}-${year}`;

</script>

</body>
</html>
