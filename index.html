<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karupetti House</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#f3efe8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:92%;
    max-width:360px;
    background:#ffffff;
    border-radius:18px;
    padding:28px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

h1{
    text-align:center;
    color:#222;
    font-size:30px;
    margin-bottom:18px;
}

.product{
    text-align:center;
    color:#2e7d32;
    font-size:22px;
    font-weight:600;
    margin-bottom:22px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 0;
    border-bottom:1px solid #ececec;
    font-size:18px;
}

.label{
    font-weight:700;
    color:#333;
}

.value{
    color:#333;
}

.price{
    margin-top:24px;
    background:#edf7ef;
    color:#1b5e20;
    text-align:center;
    padding:14px;
    border-radius:12px;
    font-size:30px;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#888;
    font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h1>Karupetti House</h1>

<div class="product">
🟢 VEG SANDWICH
</div>

<div class="row">
<span class="label">FSSAI No.</span>
<span class="value">10026912000209</span>
</div>

<div class="row">
<span class="label">MFG</span>
<span class="value" id="mfg-date"></span>
</div>

<div class="row">
<span class="label">Validity</span>
<span class="value">1 Day</span>
</div>

<div class="price">
₹50
</div>

<div class="footer">
Freshly Prepared • Best Before 1 Day
</div>

</div>

<script>

const today = new Date();

const day = String(today.getDate()).padStart(2,'0');
const month = String(today.getMonth()+1).padStart(2,'0');
const year = today.getFullYear();

document.getElementById("mfg-date").textContent =
`${day}-${month}-${year}`;

</script>

</body>
</html>
